<!-- Email -->
<div class="mb-4">
  <label class="text-sm text-gray-500">Email Address *</label>

  <div class="relative mt-1 group">

    <!-- ✅ Icon -->
    <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-[#8a7f75] group-focus-within:text-[#D88E7B] transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </span>

    <!-- ✅ Input -->
    <input
      type="email"
      placeholder="Enter your email"
      class="w-full pl-10 pr-3 py-2 border border-[rgba(60,50,40,0.12)] rounded-md text-sm
            focus:outline-none transition-all duration-200
            focus:shadow-[inset_0_0_0_1px_rgba(255,120,60,0.4),0_0_0_3px_rgba(255,120,60,0.08)]"
    />

  </div>
</div>

<!-- Password -->
<div class="mb-4">
  <label class="text-sm text-gray-500">Password *</label>

  <div class="relative mt-1 group">
    
    <!-- ✅ Input -->
    <input
      type="password"
      placeholder="Enter your password"
      class="w-full pl-2 pr-3 py-2 border border-[rgba(60,50,40,0.12)] rounded-md text-sm
            focus:outline-none transition-all duration-200
            focus:shadow-[inset_0_0_0_1px_rgba(255,120,60,0.4),0_0_0_3px_rgba(255,120,60,0.08)]"
    />

  </div>
</div>

<!-- Options -->
<div class="flex justify-between items-center text-sm mb-6">
  <label class="flex items-center gap-2 text-gray-600">
    <input type="checkbox" class="accent-primary" />
    Remember me
  </label>

  <a class="text-primary cursor-pointer hover:underline">
    Forgot Password?
  </a>
</div>
