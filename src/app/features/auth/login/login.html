<div class="flex h-screen font-gabarito">
  <!-- Left side image (40%) -->
  <div class="hidden md:flex w-[40%] h-screen bg-white p-2">
    <img src="assets/loginbg.png" alt="ERP Illustration"
         class="object-cover w-full h-full rounded-lg shadow-md">
  </div>

  <!-- Right side form (60%) -->
  <div class="flex w-full md:w-[60%] h-screen items-center justify-center bg-white">
    <div class="w-full max-w-md p-8">

      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <img src="assets/logoName.svg" alt="Company Logo" class="h-12">
      </div>

      <!-- Heading -->
      <h2 class="text-2xl font-bold text-center text-gray-800">Secure Access</h2>
      <p class="text-center text-gray-600 mb-6">
        Unlock your workspace using your PIN or password
      </p>

      <!-- Tabs -->
      <div class="flex border border-gray-200 rounded-md mb-6 gap-1 p-1">
        <app-button
          class="flex-1"
          [variant]="activeTab === 'pin' ? 'primary' : 'neutral'"
          type="button"
          [fullWidth]="true"
          (click)="switchTab('pin')">
          <span class="flex items-center justify-center gap-2">
            <lucide-icon [img]="KeyRound" [size]="16"></lucide-icon>
            Quick PIN
          </span>
        </app-button>

        <app-button
          class="flex-1"
          [variant]="activeTab === 'password' ? 'primary' : 'neutral'"
          type="button"
          [fullWidth]="true"
          (click)="switchTab('password')">
          <span class="flex items-center justify-center gap-2">
            <lucide-icon [img]="LockKeyhole" [size]="16"></lucide-icon>
            Password
          </span>
        </app-button>
      </div>

      <!-- Forms wrapper -->
      <div class="min-h-[260px] relative">

        <!-- PIN Form -->
        <form [class.hidden]="activeTab !== 'pin'" [formGroup]="pinForm"
              (ngSubmit)="onSubmit()" class="space-y-4 absolute inset-0">

          <!-- Email -->
          <app-input-field
            label="Email Address"
            type="email"
            [leftIcon]="UserRound"
            placeholder="Enter your email address"
            [required]="true"
            formControlName="email">
          </app-input-field>

          <!-- PIN inputs -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Enter 6-digit PIN</label>
            <div class="flex space-x-6 mt-1">
              <input type="text" maxlength="1" class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition" />
              <input type="text" maxlength="1" class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition" />
              <input type="text" maxlength="1" class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition" />
              <input type="text" maxlength="1" class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition" />
              <input type="text" maxlength="1" class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition" />
              <input type="text" maxlength="1" class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition" />
            </div>
          </div>

          <!-- Remember me & Forgot PIN -->
          <div class="flex items-center justify-between">
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="rounded border-gray-300">
              <span class="text-sm text-gray-700">Remember me</span>
            </label>
            <a href="#" class="text-sm text-primary hover:underline">Forgot PIN?</a>
          </div>

          <!-- Submit -->
          <app-button variant="primary" type="submit" [fullWidth]="true">
            Unlock Workspace
          </app-button>
        </form>

        <!-- Password Form -->
        <form [class.hidden]="activeTab !== 'password'" [formGroup]="loginForm"
              (ngSubmit)="onSubmit()" class="space-y-4 absolute inset-0">

          <!-- Email -->
          <app-input-field
            label="Email Address"
            type="email"
            [leftIcon]="UserRound"
            placeholder="Enter your email address"
            [required]="true"
            formControlName="email">
          </app-input-field>

          <!-- Password -->
          <app-input-field
            label="Password"
            type="password"
            [leftIcon]="LockKeyhole"
            placeholder="Enter your password"
            [required]="true"
            helperText="Minimum 8 characters."
            formControlName="password">
          </app-input-field>

          <!-- Remember me & Forgot Password -->
          <div class="flex items-center justify-between">
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="rounded border-gray-300">
              <span class="text-sm text-gray-700">Remember me</span>
            </label>
            <a href="#" class="text-sm text-primary hover:underline">Forgot Password?</a>
          </div>

          <!-- Submit -->
          <app-button variant="primary" type="submit" [fullWidth]="true">
            Unlock Workspace
          </app-button>
        </form>

      </div>
      
    </div>

  </div>

</div>
