<div class="flex h-screen font-gabarito">
  <!-- Left side image (40%) -->
  <div class="hidden md:flex w-[40%] h-screen bg-white p-2">
    <img
      src="assets/loginbg.png"
      alt="ERP Illustration"
      class="object-cover w-full h-full rounded-lg shadow-md"
    />
  </div>

  <!-- Right side form (60%) -->
  <div class="flex w-full md:w-[60%] h-screen items-center justify-center bg-white">
    <div class="w-full max-w-md p-8">
      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <img src="assets/logoName.svg" alt="Company Logo" class="h-12" />
      </div>

      <!-- Heading -->
      <h2 class="text-2xl font-bold text-center text-gray-800">Secure Access</h2>
      <p class="text-center text-gray-600 mb-6">Setup your workspace password and PIN</p>

      <!-- Unified Form -->
      <form [formGroup]="setupForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Password -->
        <app-input-field
          label="Password"
          type="password"
          [leftIcon]="LockKeyhole"
          placeholder="Enter your password"
          [required]="true"
          helperText="Minimum 8 characters."
          formControlName="password"
        ></app-input-field>

        <!-- Confirm Password -->
        <app-input-field
          label="Confirm Password"
          type="password"
          [leftIcon]="LockKeyhole"
          placeholder="Re-enter your password"
          [required]="true"
          formControlName="confirmPassword"
        ></app-input-field>

        <!-- PIN -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Enter 6-digit PIN</label>
          <div class="flex space-x-6 mt-1">
            <input
              #pin1
              type="password"
              maxlength="1"
              inputmode="numeric"
              formControlName="pin1"
              class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition"
              (input)="onPinDigitInput(0, $event, pin2)"
              (keydown)="onPinDigitKeydown($event, 0)"
            />

            <input
              #pin2
              type="password"
              maxlength="1"
              inputmode="numeric"
              formControlName="pin2"
              class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition"
              (input)="onPinDigitInput(1, $event, pin3, pin1)"
              (keydown)="onPinDigitKeydown($event, 1, pin1)"
            />

            <input
              #pin3
              type="password"
              maxlength="1"
              inputmode="numeric"
              formControlName="pin3"
              class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition"
              (input)="onPinDigitInput(2, $event, pin4, pin2)"
              (keydown)="onPinDigitKeydown($event, 2, pin2)"
            />

            <input
              #pin4
              type="password"
              maxlength="1"
              inputmode="numeric"
              formControlName="pin4"
              class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition"
              (input)="onPinDigitInput(3, $event, pin5, pin3)"
              (keydown)="onPinDigitKeydown($event, 3, pin3)"
            />

            <input
              #pin5
              type="password"
              maxlength="1"
              inputmode="numeric"
              formControlName="pin5"
              class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition"
              (input)="onPinDigitInput(4, $event, pin6, pin4)"
              (keydown)="onPinDigitKeydown($event, 4, pin4)"
            />

            <input
              #pin6
              type="password"
              maxlength="1"
              inputmode="numeric"
              formControlName="pin6"
              class="w-11 h-12 text-center border border-gray-200 rounded-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition"
              (input)="onPinDigitInput(5, $event, undefined, pin5)"
              (keydown)="onPinDigitKeydown($event, 5, pin5)"
            />
          </div>
        </div>

        <!-- Submit -->
        <app-button variant="primary" type="submit" [fullWidth]="true">
          Save & Continue
        </app-button>
      </form>
    </div>
  </div>
</div>
