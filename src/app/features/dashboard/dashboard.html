<div class="px-6">

    <!-- Dashboard Header -->
    <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between py-1">

        <app-page-title title="Dashboard Overview" description="Summary of recent activity, deployments, and key metrics."></app-page-title>

    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4 py-6">

        @for (card of cards; track card.title) {

            <app-summary-card
                [card]="card">
            </app-summary-card>

        }

    </div>

    <!-- Main Dashboard Content -->
    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">

        <!-- Left Section -->
        <div class="xl:col-span-2 space-y-6">

            <!-- Recent Projects -->
            <app-recent-projects></app-recent-projects>

            <!-- Deployment Chart -->
            <app-dashboard-chart></app-dashboard-chart>

        </div>

        <!-- Right Section -->
        <div class="space-y-6">

            <!-- Recent Activity -->
            <app-dashboard-activity>
            </app-dashboard-activity>

        </div>

    </div>
    
</div>
