<div>
  <!-- Header -->
  <div class="mb-5 flex justify-between items-center select-none">
    <!-- Left: Title -->
    <h1 class="text-[22px] font-medium tracking-tight text-[#1a1a1a]">Deployment History</h1>

    <!-- Right: Export button -->
    <button
      class="flex items-center gap-2 px-3 py-1 rounded-md border bg-white transition border-gray-200 font-semibold text-sm text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer"
      (click)="onExportCSV()"
    >
      <!-- <lucide-icon [img]="Download" [size]="16"></lucide-icon> -->
      Export CSV
    </button>
  </div>

  <!-- Filter + Search + Sort bar -->
  <div
    class="flex flex-col bg-white md:flex-row md:items-center justify-between gap-2 border border-black/5 rounded-md p-2 mb-3 select-none"
  >
    <!-- Left: Filter bar -->
    <div class="p-2 bg-[#fdfcf9] border border-gray-200 rounded-sm shadow-sm">
      <app-sort-bar
        [options]="filterOptions"
        [active]="activeFilter"
        (filterChange)="onFilterChange($event)"
      >
      </app-sort-bar>
    </div>

    <!-- Right: Shared filter controls -->
    <div class="flex justify-end gap-2">
      <app-input-field
        label=""
        type="text"
        [leftIcon]="SearchIcon"
        placeholder="Search deployments...."
        [required]="false"
        formControlName="historySearch"
      >
      </app-input-field>

      <app-dropdown [options]="environments" (selectionChange)="onEnvironmentChange($event)">
      </app-dropdown>

      <app-dropdown [options]="projects" (selectionChange)="onProjectChange($event)">
      </app-dropdown>
    </div>
  </div>

  <!-- Deployment list -->
  <div class="w-full bg-white border border-black/5 rounded-md overflow-hidden">
    <div class="overflow-x-auto w-full">
      <app-data-table [tables]="[tableConfig]" (actionClicked)="handleTableAction($event)">
      </app-data-table>
    </div>
  </div>
</div>
