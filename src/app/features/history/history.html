<div class="px-1">

    <!-- Header -->
    <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">

        <app-page-title title="Deployment History" description="Browse deployment records, filter by project, environment, and date."></app-page-title>

        <app-harborButton caption="Export CSV" (clicked)="onExport()"></app-harborButton>

    </div>

    <!-- Toolbar -->
    <div class="grid w-full grid-cols-1 gap-4 bg-white border border-black/5 rounded-md p-3 mb-5 select-none md:grid-cols-[auto_1fr_auto] md:items-end md:px-2">

      <!-- First column: status filter -->
      <div class="min-w-0">
        <div class="relative inline-flex w-full rounded-md border border-[rgba(60,50,40,0.12)] bg-[#fdfcf9] p-[4px] select-none">
          <app-selection 
            [options]="['All', 'Success', 'Failed', 'Running']" 
            [(selected)]="selectedFilter">
          </app-selection>
        </div>
      </div>

      <!-- Second column: search -->
      <div class="min-w-0 w-full md:flex md:justify-end">
        <app-search 
          placeholder="Search deployments..." 
          (clicked)="onSearch()">
        </app-search>
      </div>

      <!-- Third column: dropdown filters + date -->
      <div class="flex flex-col gap-3 w-full min-w-0 md:flex-row md:items-center md:gap-3">
        <select
          class="w-full h-10 rounded-lg border border-slate-100 px-3 py-1.5 text-sm outline-none transition focus:border-[#D88E7B] focus:ring-2 focus:ring-[#D88E7B]/30 md:w-[auto]"
          [(ngModel)]="selectedProject"
        >
          <option *ngFor="let project of projectOptions" [value]="project">{{ project }}</option>
        </select>

        <select
          class="w-full h-10 rounded-lg border border-slate-100 px-3 py-1.5 text-sm outline-none transition focus:border-[#D88E7B] focus:ring-2 focus:ring-[#D88E7B]/30 md:w-[auto]"
          [(ngModel)]="selectedEnvironment"
        >
          <option *ngFor="let environment of environmentOptions" [value]="environment">{{ environment }}</option>
        </select>

        <input
          type="date"
          class="w-full h-10 rounded-lg border border-slate-100 px-3 py-1.5 text-sm outline-none transition focus:border-[#D88E7B] focus:ring-2 focus:ring-[#D88E7B]/30 md:w-[130px]"
          [(ngModel)]="selectedDate"
          aria-label="Select date"
        />
      </div>

    </div>

    <!-- Data Table -->
    <div class="mt-2 h-auto">
      <app-table
        [data]="filteredDeployments"
        [columns]="columns"
        [actions]="actions"
        emptyMessage="No deployment history available."
      >
      </app-table>
    </div>
</div>
