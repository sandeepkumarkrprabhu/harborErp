<div
  class="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-2xs p-4"
>
  <div
    class="bg-white rounded-md border border-black/5 shadow-xl w-full max-w-5xl flex flex-col md:flex-row overflow-hidden max-h-[90vh] md:h-[620px]"
  >
    <!-- Sidebar -->
    <app-wizard-steps
      [steps]="[
        { number: 1, title: 'Step 1', subtitle: 'Project Identity' },
        { number: 2, title: 'Step 2', subtitle: 'Source & Config' },
        { number: 3, title: 'Step 3', subtitle: 'Review & Create' },
      ]"
      [currentStep]="1"
    >
    </app-wizard-steps>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-h-0 bg-white">
      <app-wizard-header [title]="'Create Project'" (close)="onCloseWizard()"> </app-wizard-header>

      <app-project-identity></app-project-identity>
      <app-wizard-footer
        [currentStep]="step"
        [totalSteps]="3"
        (next)="nextStep()"
        (prev)="prevStep()"
        (submit)="submit()"
      >
      </app-wizard-footer>
    </div>
  </div>
</div>
