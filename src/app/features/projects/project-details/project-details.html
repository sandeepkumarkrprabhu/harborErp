<div class="p-6 space-y-5">
  @if (project) {
    <div class="border-b border-gray-200 pb-4">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-[22px] font-medium text-[#1a1a1a]">{{ project.project_name }}</h2>
          <p class="text-sm text-[#6b5e52] mt-1">{{ project.project_description }}</p>
          <div class="flex items-center gap-3 mt-3">
            <span
              class="inline-flex items-center gap-1 bg-white border border-black/5 text-[#6b5e52] text-[11px] font-medium px-2 py-0.5 rounded-sm"
              >{{ this.project.source }}
            </span>
            <span
              class="inline-flex items-center gap-1 bg-white border border-black/5 text-[#6b5e52] text-[11px] font-medium px-2 py-0.5 rounded-sm"
              >{{ this.project.branch }}
            </span>
          </div>
        </div>
        <button
          class="px-2 py-1 bg-primary text-white text-sm font-medium rounded-md hover:bg-primary/90 transition"
          (click)="onAddNewEnvironment()"
        >
          + Add Environment
        </button>
      </div>
    </div>

    <!-- Enviornments and Deployments -->
    <div class="flex items-center gap-2">
      <h3 class="text-sm font-semibold text-gray-800">Environments</h3>
      <app-badge badgeStatus="success" text="4 total. 4 healthy"></app-badge>
    </div>
    <div class="mb-8">
      <app-data-table
        [tables]="[environmentTableConfig]"
        (actionClicked)="handleEnvironmentAction($event)"
      >
      </app-data-table>
    </div>

    <div>
      <h3 class="text-lg font-semibold text-gray-800 mb-3">Deployments</h3>
      <app-data-table
        [tables]="[deploymentTableConfig]"
        (actionClicked)="handleDeploymentAction($event)"
      >
      </app-data-table>
    </div>
  } @else {
    <div class="bg-white border border-black/5 rounded-md p-6">
      <h2 class="text-xl font-semibold text-[#1a1a1a]">Project not loaded</h2>
      <p class="text-sm text-[#6b5e52] mt-2">
        No project object was passed for project id "{{ projectId }}". Open this page from a project
        card.
      </p>
    </div>
  }
</div>
