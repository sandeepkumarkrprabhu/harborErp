<div class="p-6 space-y-5">
  @if (project$ | async; as detail) {
    <!-- Success state -->
    <div class="border-b border-gray-200 pb-4">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-[22px] font-medium text-[#1a1a1a]">{{ detail.projectName }}</h2>
          <p class="text-sm text-[#6b5e52] mt-1">{{ detail.projectDescription }}</p>
          <div class="flex items-center gap-3 mt-3">
            <span class="px-2 py-0.5 text-xs rounded bg-blue-100 text-blue-600">
              Source: {{ project?.source }}
            </span>
            <span class="px-2 py-0.5 text-xs rounded bg-purple-100 text-purple-600">
              Branch: {{ project?.branch }}
            </span>
          </div>
        </div>
        <button
          class="px-2 py-1 bg-primary text-white text-sm font-medium rounded-md hover:bg-primary/90 transition"
          (click)="onAddNewEnvironment()"
        >
          + Add Environment
        </button>
      </div>
    </div>

    <!-- Environments -->
    <div class="flex items-center gap-2">
      <h3 class="text-sm font-semibold text-gray-800">Environments</h3>
      <app-badge
        badgeStatus="success"
        [text]="detail.environments.length + ' total. ' + project?.healthy + ' healthy'"
      ></app-badge>
    </div>
    <div class="mb-8">
      <app-data-table
        [tables]="[{ ...environmentTableConfig, data: (environments$ | async) ?? [] }]"
        (actionClicked)="handleEnvironmentAction($event)"
      ></app-data-table>
    </div>

    <!-- Deployments -->
    <div>
      <h3 class="text-lg font-semibold text-gray-800 mb-3">Deployments</h3>
      <app-data-table
        [tables]="[{ ...deploymentTableConfig, data: (deployments$ | async) ?? [] }]"
        (actionClicked)="handleDeploymentAction($event)"
      ></app-data-table>
    </div>
  }
</div>
