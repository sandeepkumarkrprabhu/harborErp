<div class="px-6 py-5">
  <h3 class="text-sm font-semibold text-[#1a1a1a] pb-1 border-b border-black/5">
    Project Identity
  </h3>

  <!-- Project Name -->
  <label class="text-xs font-semibold text-[#8a7f75]"
    >Project Name <span class="text-[#c62828]">*</span></label
  >
  <input
    type="text"
    [value]="data.name"
    (input)="updateField('name', $event.target.value)"
    placeholder="eg. harbor-api, frontend-api"
    class="w-full bg-[#fdfcf9] border border-black/5 text-sm px-3 py-2.5 rounded-md focus:outline-none focus:border-[#d08873]/50"
  />

  <!-- Team / Owner -->
  <label class="text-xs font-semibold text-[#8a7f75] mt-4"
    >Team / Owner <span class="text-[#c62828]">*</span></label
  >
  <select
    #teamSelect
    [value]="data.team"
    (change)="updateField('team', teamSelect.value)"
    class="w-full bg-[#fdfcf9] border border-black/5 text-sm px-3 py-2 rounded-md focus:outline-none focus:border-[#d08873]/50"
  >
    <option value="Platform Engineering">Platform Engineering</option>
    <option value="Product Delivery">Product Delivery</option>
    <option value="Core Architecture">Core Architecture</option>
  </select>

  <!-- Project Type -->
  <label class="text-xs font-semibold text-[#8a7f75] mt-4"
    >Project Type <span class="text-[#c62828]">*</span></label
  >
  <select
    #teamSelect
    [value]="data.team"
    (change)="updateField('team', teamSelect.value)"
    class="w-full bg-[#fdfcf9] border border-black/5 text-sm px-3 py-2 rounded-md focus:outline-none focus:border-[#d08873]/50"
  >
    <option value="Internal Project">Internal Project</option>
    <option value="Client Project">Client Project</option>
    <option value="Open Source">Open Source</option>
  </select>

  <!-- Description -->
  <label class="text-xs font-semibold text-[#8a7f75] mt-4"
    >Description <span class="text-[#c62828]">*</span></label
  >
  <textarea
    #desc
    rows="3"
    [value]="data.description"
    (input)="updateField('description', desc.value)"
    placeholder="Brief description of what this project does"
    class="w-full bg-[#fdfcf9] border border-black/5 text-sm p-2.5 rounded-md focus:outline-none focus:border-[#d08873]/50"
  ></textarea>

  <!-- Tags -->
  <label class="text-xs font-semibold text-[#8a7f75] mt-4">Tags</label>
  <input
    type="text"
    [value]="data.tags.join(', ')"
    (input)="
      updateField(
        'tags',
        $event.target.value.split(',').map((t) => t.trim())
      )
    "
    placeholder="eg. backend, go, etc"
    class="w-full bg-[#fdfcf9] border border-black/5 text-sm px-3 py-2.5 rounded-md focus:outline-none focus:border-[#d08873]/50"
  />

  <!-- Members -->
  <label class="text-xs font-semibold text-[#8a7f75] mt-4">Members</label>
  <input
    type="text"
    [value]="data.members.join(', ')"
    (input)="
      updateField(
        'members',
        $event.target.value.split(',').map((m) => m.trim())
      )
    "
    placeholder="eg. sangeeth"
    class="w-full bg-[#fdfcf9] border border-black/5 text-sm px-3 py-2.5 rounded-md focus:outline-none focus:border-[#d08873]/50"
  />
</div>
