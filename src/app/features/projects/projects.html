<div class="space-y-6">

    <!-- Header -->
    <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">

        <div>
            <h1 class="text-3xl font-bold text-gray-900">
                Projects
            </h1>
        </div>

        <button class="rounded-lg bg-[#D88E7B] px-4 py-2 text-sm text-white hover:bg-blue-700">

            + New Project

        </button>

    </div>

    <!-- Toolbar -->
    <div class="flex flex-col gap-3 lg:flex-row lg:items-center">

        <input
            type="text"
            placeholder="Search projects..."
            class="w-full lg:w-72 px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-orange-200">

        <div class="flex flex-wrap gap-2">

            <button class="px-3 py-1 text-xs rounded-md bg-orange-100 text-orange-700 border border-orange-200">
                All (6)
            </button>

            <button class="px-3 py-1 text-xs rounded-md border border-gray-200">
                Active (5)
            </button>

            <button class="px-3 py-1 text-xs rounded-md border border-gray-200">
                Degraded (1)
            </button>

            <button class="px-3 py-1 text-xs rounded-md border border-gray-200">
                Archived
            </button>

        </div>

    </div>

    <!-- Project Cards -->
    <div class="grid grid-cols-1 xl:grid-cols-3 gap-5">

        @for(project of projects; track project.id){

            <div class="bg-white rounded-lg border border-gray-200 shadow-sm hover:shadow-md transition">

                <div class="p-4">

                    <div class="flex justify-between items-start">

                        <div>

                            <h3 class="font-semibold text-gray-900">
                                {{ project.name }}
                            </h3>

                            <p class="text-xs text-gray-500 mt-1">
                                {{ project.description }}
                            </p>

                        </div>

                        <span
                            class="px-2 py-1 rounded text-[10px] bg-gray-100 text-gray-600">

                            {{ project.environment }}

                        </span>

                    </div>

                    <!-- Health -->

                    <div class="mt-5">

                        <div class="flex gap-3 text-xs">

                            <span class="text-green-600">
                                {{ project.healthy }} healthy
                            </span>

                            @if(project.unhealthy > 0){

                                <span class="text-red-500">
                                    {{ project.unhealthy }} unhealthy
                                </span>

                            }

                        </div>

                        <div class="mt-2 h-1.5 bg-gray-200 rounded-full">

                            <div
                                class="h-1.5 rounded-full"
                                [style.width.%]="project.health"
                                [class]="project.health === 100
                                    ? 'bg-green-500'
                                    : 'bg-orange-400'">
                            </div>

                        </div>

                    </div>

                </div>

                <div
                    class="px-4 py-3 border-t border-gray-100 flex justify-between items-center text-xs">

                    <span class="text-gray-500">
                        Last: {{ project.lastDeployment }} · {{ project.owner }}
                    </span>

                    <button
                        class="text-orange-500 hover:text-orange-600 font-medium">

                        View
                        <i class="pi pi-arrow-right ml-1"></i>

                    </button>

                </div>

            </div>

        }

    </div>

</div>
