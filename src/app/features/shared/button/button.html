<button
  type="button"
  class="rounded-lg bg-[#D88E7B] px-[10px] inline-flex items-center gap-2 text-sm text-white hover:bg-[#C97862]"
  [style.height]="buttonHeight"
  (click)="clicked.emit($event)">

  <ng-container *ngIf="icon">
    <lucide-icon [img]="icon" class="h-4 w-4"></lucide-icon>
  </ng-container>
  {{ caption }}

</button>
