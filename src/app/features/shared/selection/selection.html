<div class="flex flex-wrap gap-2">
    <button *ngFor="let opt of options"
            (click)="onSelect(opt)"
            [class]="opt === selected ? 'flex items-center justify-center gap-1.5 rounded-[5px] px-4 py-2 bg-[#D88E7B] text-xs font-semibold transition-colors duration-200 cursor-pointer text-white' : 'flex items-center justify-center gap-1.5 rounded-[5px] px-4 py-2 text-xs font-semibold transition-colors duration-200 cursor-pointer text-[#6b5e52] hover:text-[#1a1a1a]'">
    {{ opt }}
    </button>
</div>
