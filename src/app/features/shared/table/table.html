<div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
  <div class="overflow-x-auto">
    <table class="min-w-full border-b border-slate-100">
      <thead class="bg-[#FFF4F4]">
        <tr>
          <th
            *ngFor="let column of columns"
            [style.width]="column.width"
            [ngClass]="getHeadingClasses(column)"
            [class.text-center]="column.align === 'center'"
            [class.text-right]="column.align === 'right'"
          >
            {{ column.label }}
          </th>
          <th
            *ngIf="actions.length"
            class="px-4 py-3 text-center text-sm font-semibold text-slate-600 w-[90px]"
            style="min-width: 90px;"
          >
            Actions
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="!data.length">
          <td class="px-4 py-6 text-center text-sm text-slate-300" [attr.colspan]="columns.length + (actions.length ? 1 : 0)">
            {{ emptyMessage }}
          </td>
        </tr>
        <tr *ngFor="let item of data; let i = index; trackBy: trackByIndex" class="hover:bg-[#f4f2ef] transition-colors duration-150 group">
          <td
            *ngFor="let column of columns"
            [ngClass]="[...getCellClasses(column), 'border-b border-slate-100']"
            [class.text-center]="column.align === 'center'"
            [class.text-right]="column.align === 'right'"
          >
            <ng-container *ngIf="column.avatar; else normalCell">
              <div class="flex items-center gap-3">
                <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-[#D88E7B] text-xs font-semibold text-white">
                  {{ getAvatarLetter(item, column) }}
                </span>
                <span class="truncate">{{ getCellValue(item, column) }}</span>
              </div>
            </ng-container>
            <ng-template #normalCell>
              <ng-container [ngSwitch]="column.key">
              <ng-container *ngSwitchCase="'status'">
                <span [ngClass]="['inline-flex items-center rounded-full px-2 py-1 text-sm font-semibold', getStatusBadgeClass(getCellValue(item, column))]">
                  {{ getCellValue(item, column) }}
                </span>
              </ng-container>
              <ng-container *ngSwitchCase="'commit'">
                <span class="inline-flex items-center rounded-full bg-slate-50 px-2 py-1 text-xs font-mono text-slate-700">
                  {{ getCellValue(item, column) }}
                </span>
              </ng-container>
              <ng-container *ngSwitchCase="'PRCommit'">
                <span class="inline-flex items-center rounded-full bg-slate-50 px-2 py-1 text-xs font-mono text-slate-700">
                  {{ getCellValue(item, column) }}
                </span>
              </ng-container>
              <ng-container *ngSwitchCase="'branch'">
                <span class="inline-flex items-center rounded-full bg-slate-100 px-2 py-1 text-xs font-semibold text-slate-700">
                  {{ getCellValue(item, column) }}
                </span>
              </ng-container>
              <ng-template ngSwitchDefault>
                {{ getCellValue(item, column) }}
              </ng-template>
            </ng-container>
          </ng-template>
          </td>
          <td *ngIf="actions.length" class="px-4 py-4 text-center border-b border-slate-100">
            <div class="flex justify-center gap-2 flex-wrap">
              <ng-container *ngFor="let action of actions">
                <button
                  *ngIf="!action.visible || action.visible(item)"
                  type="button"
                  class="rounded-md border px-3 py-1 text-sm transition hover:bg-slate-100"
                  [ngClass]="action.class || ''"
                  (click)="action.handler(item)"
                  [attr.aria-label]="action.label"
                >
                  <ng-container *ngIf="action.icon; else textLabel">
                    <lucide-icon [img]="action.icon" class="h-4 w-4"></lucide-icon>
                  </ng-container>
                  <ng-template #textLabel>{{ action.label }}</ng-template>
                </button>
              </ng-container>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
