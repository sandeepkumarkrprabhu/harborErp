<div class="flex gap-6 px-6 py-5 h-full">
  <div class="flex-1">
    <h3 class="text-sm font-semibold text-[#1a1a1a] pb-1 border-b border-black/5">Team Identity</h3>

    <div class="grid grid-cols-1 mt-3">
      <!-- Team Name -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-[#8a7f75]">
          Team Name <span class="text-[#c62828]">*</span>
        </label>
        <input
          #memberName
          type="text"
          [value]="data.teamName"
          (input)="updateField('teamName', memberName.value)"
          placeholder="eg. Alex K."
          class="w-full bg-[#fdfcf9] border text-sm px-3 py-2.5 rounded-md focus:outline-none focus:border-[#d08873]/50"
          [class.border-[#c62828]/60]="errorFor('teamName')"
          [class.border-black/5]="!errorFor('teamName')"
        />
        @if (errorFor('teamName')) {
          <span class="text-[10px] text-[#c62828]">{{ errorFor('teamName') }}</span>
        }
      </div>
    </div>
    <div class="grid grid-cols-1 gap-4 mt-3">
      <!-- Description -->

      <!-- Team Lead -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-[#8a7f75]">
          Team Lead <span class="text-[#c62828]">*</span>
        </label>
        <select
          #teamLead
          [value]="data.teamLeadID"
          (change)="updateField('teamLeadID', teamLead.value)"
          class="w-full bg-[#fdfcf9] border text-sm px-3 py-2 rounded-md focus:outline-none focus:border-[#d08873]/50"
          [class.border-[#c62828]/60]="errorFor('teamLeadID')"
          [class.border-black/5]="!errorFor('teamLeadID')"
        >
          <option value="">Select Team Lead</option>
          @for (teamLead of teamLeads; track teamLead.id) {
            <option [value]="teamLead.id">{{ teamLead.name }} ({{ teamLead.role_name }})</option>
          }
        </select>

        @if (errorFor('teamLeadID')) {
          <span class="text-[10px] text-[#c62828]">{{ errorFor('teamLeadID') }}</span>
        }
      </div>
    </div>

    <div class="grid grid-cols-1 gap-4 mt-3 mb-3">
      <!-- Notes -->
      <label class="text-xs font-semibold text-[#8a7f75] mt-4">Notes</label>
      <textarea
        #description
        rows="4"
        [value]="data.teamDescription"
        (input)="updateField('teamDescription', description.value)"
        placeholder="Responsible for core user backend api's"
        class="w-full bg-[#fdfcf9] border border-black/5 text-sm p-2.5 rounded-md focus:outline-none focus:border-[#d08873]/50"
      ></textarea>
    </div>
  </div>
</div>
