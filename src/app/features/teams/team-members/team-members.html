<div class="flex gap-6 px-6 py-5 h-full">
  <div class="flex-1">
    <h3 class="flex justify-between items-center pb-2 border-b border-black/5">
      <div class="flex items-center gap-3 w-full">
        <div class="flex-1">Select Team Members</div>
        <div class="w-40">
          <input
            type="text"
            placeholder="Search users..."
            (input)="onSearchInput($event.target.value)"
            class="w-full text-sm px-2 py-1 border rounded"
          />
        </div>
        <span class="text-[10px] text-[#8a7f75] font-semibold ml-3"
          >{{ selectedMembers().length }} selected</span
        >
      </div>
    </h3>

    @if (showErrors && errors['teamMembers']) {
      <div class="mt-2 p-2 bg-red-50 border border-red-200 rounded text-red-600 text-xs">
        {{ errors['teamMembers'] }}
      </div>
    }

    <!-- Scrollable container -->
    <div class="grid grid-cols-2 gap-4 mt-3 max-h-[80vh] overflow-y-auto pr-2">
      @for (user of users(); track user.id) {
        <div
          class="flex items-center gap-3 p-3 rounded-md border border-black/5 bg-[#fdfcf9] hover:bg-[#f4f2ef]/50 transition-colors cursor-pointer"
        >
          <input
            type="checkbox"
            [id]="'user-' + user.id"
            [checked]="user.selected"
            (change)="onUserSelectionChange(user)"
            class="w-5 h-5 cursor-pointer appearance-none rounded-full border border-gray-400 checked:bg-primary checked:border-primary transition-colors"
          />

          <label [for]="'user-' + user.id" class="flex-1 cursor-pointer">
            <div class="flex items-center gap-2.5">
              <div
                class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-semibold shrink-0"
                [class]="getUserAvatarClass(user.name)"
              >
                {{ getUserInitials(user.name) }}
              </div>

              <div class="flex flex-col flex-1">
                <span class="text-xs font-bold text-[#1a1a1a]">{{ user.name }}</span>
                <span class="text-[10px] text-[#8a7f75]">{{ user.role_name }}</span>
              </div>
            </div>
          </label>
        </div>
      }
    </div>
  </div>
</div>
