<div class="px-6">

    <!-- Header -->
    <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">

        <app-page-title title="Users" description="5 Users. 0 Pending"></app-page-title>

        <app-harborButton [icon]="UserPlus" caption="Add New User" (clicked)="onAddNewMember()"></app-harborButton>

    </div>

    <!-- Toolbar -->
    <div class="grid w-full grid-cols-1 gap-4 bg-[#fdfcf9] border border-black/5 rounded-md p-3 mb-5 select-none md:grid-cols-[auto_1fr_auto] md:items-end md:px-2">

      <div class="flex gap-2 md:col-start-3">
        <input 
          type="text" 
          placeholder="Email address" 
          class="px-3 py-2 border border-black/10 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 transition">
          Send Invite
        </button>
      </div>
    </div>

    <!-- Data Table -->
    <div class="mt-2 h-auto">
      <app-table
        [data]="filteredUsers"
        [columns]="columns"
        [actions]="actions"
        emptyMessage="No team member found."
      >
      </app-table>
    </div>
</div>
