<div class="flex h-screen overflow-hidden bg-[#fdfcf9]">
  <!-- Sidebar -->
  <app-sidebar></app-sidebar>

  <!-- Main content area -->
  <div class="flex flex-col flex-1 overflow-hidden">
    <!-- Top bar -->
    <header
      class="h-13 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0"
    >
      <!-- Page title -->
      <div>
        <h1 class="text-base font-semibold text-gray-800">{{ pageTitle }}</h1>
      </div>

      <div class="m-4 w-[30%] bg-gray-100 rounded-md">
        <app-input-field
          label=""
          type="text"
          [leftIcon]="SearchIcon"
          placeholder="Search projects, tasks, deployments,users...."
          [required]="false"
          formControlName="globalSearch"
        >
        </app-input-field>
      </div>
      <!-- Right: user info -->
      <div class="flex items-center gap-3">
        <div class="text-right">
          <button
            class="px-2 py-1 mr-5 bg-primary text-white text-sm font-medium rounded-md hover:bg-primary/90 transition"
            (click)="toggleQuickActions()"
          >
            + Quick Actions
          </button>
        </div>
      </div>
    </header>

    <!-- Dropdown Panel -->
    <app-quick-actions-panel [isOpen]="showQuickActions"></app-quick-actions-panel>

    <!-- Scrollable page content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
