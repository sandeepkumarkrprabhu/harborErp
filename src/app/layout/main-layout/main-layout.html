<div class="flex h-screen overflow-hidden bg-[#fdfcf9]">

  <!-- Sidebar -->
  <app-sidebar></app-sidebar>

  <!-- Main content area -->
  <div class="flex flex-col flex-1 overflow-hidden">

    <!-- Top bar -->
    <header class="h-13 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0">

      <!-- Page title -->
      <div>
        <h1 class="text-base font-semibold text-gray-800">{{ pageTitle }}</h1>
      </div>

      <div class="m-4 w-[30%] bg-gray-100 rounded-md">
        <app-input-field
          label=""
          type="text"
          [leftIcon]="SearchIcon"
          placeholder="Search projects, tasks, deployments,users...."
          [required]="false"
          formControlName="globalSearch">
        </app-input-field>
      </div>
      <!-- Right: user info -->
      <div class="flex items-center gap-3">
        <div class="text-right">
          <p class="text-sm font-medium text-gray-800">Admin</p>
          <p class="text-xs text-gray-400">admin@harbor.com</p>
        </div>
        <div class="w-9 h-9 rounded-full bg-primary flex items-center justify-center text-white font-semibold text-sm">
          A
        </div>
      </div>

    </header>

    <!-- Scrollable page content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
