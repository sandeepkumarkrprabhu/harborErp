<div class="flex h-screen overflow-hidden bg-[#fdfcf9]">

  <!-- Sidebar (FULL HEIGHT) -->
  <aside
    class="shrink-0 border-r border-slate-200 bg-white transition-all duration-300 flex flex-col h-full min-h-full"
    [class.w-60]="!isSidebarCollapsed"
    [class.w-20]="isSidebarCollapsed"
  >
    <app-sidebar
      [isCollapsed]="isSidebarCollapsed"
      (toggleSidebar)="toggleSidebar()">
    </app-sidebar>
  </aside>

  <!-- Right Side -->
  <div class="flex flex-1 min-h-0 flex-col overflow-hidden">

    <!-- Header -->
    <app-header
      [pageTitle]="pageTitle"
      [isSidebarCollapsed]="isSidebarCollapsed"
      (toggleSidebarEvent)="toggleSidebar()">
    </app-header>

    <!-- Content -->
    <main class="flex-1 min-h-0 overflow-y-auto bg-[#fdfcf9]">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
