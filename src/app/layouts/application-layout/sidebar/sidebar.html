<div [ngClass]="{ 'w-15': isCollapsed, 'w-full': !isCollapsed }" class="flex h-full flex-col transition-all">

  <!-- Header -->
  <div class="flex items-center justify-between px-3 py-3 border-b border-slate-200">
    <div class="flex items-center gap-2">
      <a routerLink="/" class="flex items-center">
        <img *ngIf="!isCollapsed" src="/assets/logoName.svg" alt="Harbor" class="h-6 w-auto">
        <img *ngIf="isCollapsed" src="/assets/logo.svg" alt="H" class="h-6 w-auto">
      </a>
    </div>

    <button type="button" aria-label="Toggle sidebar" (click)="onToggleSidebar()" class="rounded-lg p-2 hover:bg-slate-100 transition">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-panel-right-open text-[#6b5e52] transition-transform" aria-hidden="true" [style.transform]="isCollapsed ? 'rotate(180deg)' : 'none'">
        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
        <path d="M15 3v18"></path>
        <path d="m10 15-3-3 3-3"></path>
      </svg>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="min-h-0 flex-1 overflow-y-auto px-2 py-2">
    <ul class="space-y-2">
      <li *ngFor="let item of menuItems; trackBy: trackByRoute">
        <a [routerLink]="item?.route" class="group relative flex items-center gap-3 px-3 py-2.5 rounded-sm cursor-pointer transition-all duration-150"
           [class.menu-active]="isSelectedRoute(item.route)">
          <span *ngIf="isSelectedRoute(item.route)" class="absolute left-0 top-1 bottom-1 w-1 rounded-r" [ngClass]="item?.activeBg"></span>
            <lucide-icon [img]="item?.icon" [style.color]="isSelectedRoute(item.route) ? '#D88E7B' : item?.color" class="h-6 w-6 shrink-0 p-0.5" [class.bg-transparent]="!isSelectedRoute(item.route)" [class.rounded-md]="isSelectedRoute(item.route)"></lucide-icon>
          <span *ngIf="!isCollapsed" class="font-medium ml-2 text-sm">{{ item?.label }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="mt-auto">
    <!-- Notification quick action (above footer) -->
    <div class="px-3 mb-2">
    <a [routerLink]="notificationsItem.route" class="group flex items-center gap-3 rounded-sm px-3 py-2.5 cursor-pointer transition-all duration-150 relative"
      [class.menu-active]="isSelectedRoute(notificationsItem.route)">
        <span *ngIf="isSelectedRoute(notificationsItem.route)" class="absolute left-0 top-1 bottom-1 w-1 rounded-r" [ngClass]="notificationsItem.activeBg"></span>
        <lucide-icon [img]="notificationsItem.icon" [style.color]="isSelectedRoute(notificationsItem.route) ? '#D88E7B' : notificationsItem.color" class="h-5 w-5 shrink-0"></lucide-icon>
        <span *ngIf="notificationsCount > 0" class="ml-auto text-[10px] bg-rose-500 text-white rounded-full px-2 py-0.5 sidebar-badge">
          {{ notificationsCount }}
        </span>
      </a>
    </div>

    <!-- Footer / User (stick to bottom) -->
    <div class="border-t border-black/5 px-2 py-2 relative">
    <div class="w-full">
      <button (click)="toggleUserMenu($event)" class="w-full flex items-center justify-between gap-2 rounded-lg px-2 py-2 hover:bg-slate-100 transition" aria-haspopup="menu" aria-expanded="{{isUserMenuOpen}}">
        <div class="flex items-center gap-2">
          <app-user-avatar [isCollapsed]="isCollapsed"></app-user-avatar>
        </div>
        <span *ngIf="!isCollapsed" class="text-slate-500 transition-transform text-sm" [class.rotate-180]="isUserMenuOpen">▼</span>
      </button>

      <!-- Dropdown: positioned absolutely; opens above if isUserMenuUp -->
      <div *ngIf="isUserMenuOpen && !isCollapsed" [ngClass]="{ 'menu-up': isUserMenuUp, 'menu-down': !isUserMenuUp }" class="absolute left-3 right-3 flex flex-col gap-1 rounded-lg border bg-white shadow-sm p-2 z-50">
        <button class="flex items-center gap-2 rounded-md px-3 py-2 text-sm hover:bg-slate-100">🔒 <span>Change Password</span></button>
        <button (click)="logout()" class="flex items-center gap-2 rounded-md px-3 py-2 text-sm text-red-500 hover:bg-red-50">🚪 <span>Logout</span></button>
      </div>
    </div>
  </div>

</div>
