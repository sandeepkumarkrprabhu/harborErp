<div class="bg-white rounded-md shadow p-4 hover:shadow-md transition">

  <div class="flex justify-between items-center mb-2">
    <div class="flex items-center gap-2">

      <span
        class="w-3 h-3 rounded-full"
        [ngClass]="statusColor">
      </span>
      <h3 class="text-md font-bold text-gray-800">{{ project.name }}</h3>
    </div>
    <span class="text-xs text-gray-500">Envs: {{ project.envs }}</span>
  </div>

  <p class="text-sm text-gray-600 mb-2">{{ project.desc }}</p>

  <div class="flex gap-2 mb-2">
    <span class="px-2 py-0.5 text-xs rounded bg-blue-100 text-blue-600">
      Source: {{ project.source }}
    </span>
    <span class="px-2 py-0.5 text-xs rounded bg-purple-100 text-purple-600">
      Branch: {{ project.branch }}
    </span>
  </div>

  <div class="flex gap-4 items-center mb-1">
    <span class="text-sm text-green-600">Healthy: {{ project.healthy }}</span>
    <span class="text-sm text-red-600">Unhealthy: {{ project.unhealthy }}</span>
  </div>

  <div class="w-full h-1 bg-gray-100 rounded overflow-hidden mb-3 flex">
    <div
      class="h-2 bg-green-500"
      [style.width.%]="healthyPercent">
    </div>
    <div
      class="h-2 bg-red-500"
      [style.width.%]="unhealthyPercent">
    </div>
  </div>

  <div class="border-t border-gray-200 my-3"></div>

  <div class="flex justify-between items-center text-xs text-gray-500">
    <span>Last updated {{ project.updated }} by {{ project.by }}</span>
    <a
      class="flex items-center gap-1 text-orange-400 font-medium hover:underline">
      View <span class="text-orange-100">→</span>
    </a>
  </div>
</div>
