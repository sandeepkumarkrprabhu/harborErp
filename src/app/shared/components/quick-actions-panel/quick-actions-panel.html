<!-- quick-actions-panel.component.html -->
@if (isOpen) {
  <div
    class="absolute right-0 mt-2 w-64 bg-white/60 backdrop-blur-lg border border-black/5 shadow-lg rounded-md z-50 overflow-hidden py-1.5"
  >
    <!-- Header -->
    <div class="px-3.5 py-1.5 border-b border-black/5">
      <span class="text-[10px] font-semibold text-[#8a7f75] uppercase tracking-wider">
        Quick Actions
      </span>
    </div>

    <!-- Action Items -->
    <div class="flex flex-col px-1.5 py-1">
      @for (action of actions; track action.label) {
        <div
          (click)="navigate(action.route)"
          class="flex items-center gap-3 px-2.5 py-2 rounded-sm hover:bg-[#fbf5f2] cursor-pointer transition-colors duration-150 group"
        >
          <!-- Icon -->
          <div
            class="h-7 w-7 rounded-sm bg-[#fdfcf9] border border-black/5 flex items-center justify-center shrink-0 text-[#8a7f75] group-hover:text-[#d08873] group-hover:bg-white transition-colors"
          >
            <lucide-icon [img]="action.icon" [size]="13"></lucide-icon>
          </div>

          <!-- Text -->
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-center">
              <span
                class="text-xs font-semibold text-[#2b2622] group-hover:text-[#d08873] transition-colors"
              >
                {{ action.label }}
              </span>
              <lucide-icon
                [img]="arrowIcon"
                [size]="10"
                class="text-[#8a7f75] opacity-0 group-hover:opacity-100 transition-all transform -translate-x-0.5 group-hover:translate-x-0"
              ></lucide-icon>
            </div>
            <p class="text-[10px] text-[#8a7f75] leading-normal truncate">
              {{ action.desc }}
            </p>
          </div>
        </div>
      }
    </div>
  </div>
}
