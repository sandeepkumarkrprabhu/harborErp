<!-- Sidebar -->
<aside
  class="h-screen bg-white border-r border-gray-200 flex flex-col shrink-0 transition-all duration-300"
  [class.w-16]="isCollapsed"
  [class.w-60]="!isCollapsed"
>
  <!-- Logo (hidden on mobile, shown on desktop) -->
  <div class="h-16 hidden md:flex items-center px-6 border-b border-gray-200">
    <img src="assets/logoName.svg" alt="Harbor" class="h-8" />
    <button (click)="toggleSidebar()" class="p-2 mr-2 rounded-md hover:bg-gray-50">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-panel-right-open text-[#6b5e52] transition-transform"
        aria-hidden="true"
      >
        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
        <path d="M15 3v18"></path>
        <path d="m10 15-3-3 3-3"></path>
      </svg>
    </button>
  </div>

  <!-- Nav links -->
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-primary/10 text-primary font-semibold"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition"
      >
        <lucide-icon [img]="item.icon" [size]="18"></lucide-icon>
        <span [hidden]="isCollapsed">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Bottom: user (fixed at bottom) -->
  <div class="mt-auto border-t border-gray-200 px-4 py-4 flex items-center gap-3">
    <div
      class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white text-sm font-semibold shrink-0"
    >
      A
    </div>
    <div class="flex-1 min-w-0">
      @if (!isCollapsed) {
        <p class="text-sm font-medium text-gray-800 truncate">Admin</p>
        <p class="text-xs text-gray-400 truncate">admin@harbor.com</p>
        <p class="text-xs text-gray-500 truncate">Workspace</p>
      }
    </div>
    <button class="ml-auto" type="button" (click)="logout()" title="Logout">
      <lucide-icon
        [img]="LogOut"
        [size]="16"
        class="text-gray-400 hover:text-red-500 cursor-pointer transition"
      ></lucide-icon>
    </button>
  </div>
</aside>
