<div
  class="p-3 rounded-md border border-black/5 bg-gradient-to-br from-white to-[#fdfcf9] hover:shadow-xs transition-shadow flex items-start justify-between"
>
  <div class="flex flex-col gap-1 pr-4">
    <span class="text-xs font-bold text-[#1a1a1a]">{{ project.name }}</span>
    <p class="text-[10px] text-[#6b5e52] leading-relaxed">{{ project.desc }}</p>
  </div>
  <div class="flex flex-col items-end gap-1.5">
    <span
      class="inline-flex items-center gap-1.5 px-2.5 py-0.5 text-xs font-semibold rounded-full select-none transition-colors duration-200 bg-status-success-bg text-status-success-text text-[9px] font-bold rounded-sm px-1.5 py-0.2"
      ><span>{{ project.healthy }}</span></span
    ><a
      class="text-[9px] text-[#d08873] hover:underline flex items-center gap-0.5 mt-0.5"
      href="/projects"
      ><span>Manage</span
      ><svg
        xmlns="http://www.w3.org/2000/svg"
        width="8"
        height="8"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-external-link"
        aria-hidden="true"
      >
        <path d="M15 3h6v6"></path>
        <path d="M10 14 21 3"></path>
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path></svg
    ></a>
  </div>
</div>
