<div class="px-6 py-4 border-t border-black/5 bg-[#fdfcf9] flex justify-between items-center">
  <!-- Back -->
  <button
    (click)="prev.emit()"
    [disabled]="currentStep <= 1"
    class="flex items-center gap-2 px-4 py-2 text-sm rounded-md bg-gray-100 text-gray-700 hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed"
  >
    <lucide-icon [img]="SkipBack" class="w-4 h-4"></lucide-icon>
    Back
  </button>

  <!-- Next / Submit -->
  <button
    (click)="isLastStep ? submit.emit() : next.emit()"
    class="flex items-center gap-2 px-5 py-2.5 text-sm rounded-md text-white transition-colors {{
      isLastStep ? 'bg-green-600 hover:bg-green-700' : 'bg-primary hover:bg-primary-hover'
    }}"
  >
    {{ isLastStep ? 'Submit' : nextLabel }}
    <lucide-icon [img]="isLastStep ? CircleCheck : ChevronRight" class="w-4 h-4"></lucide-icon>
  </button>
</div>
