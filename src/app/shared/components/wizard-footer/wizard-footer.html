<div class="px-6 py-4 border-t border-black/5 bg-[#fdfcf9] flex justify-between items-center">
  <!-- Previous button -->
  <button
    (click)="prev.emit()"
    [disabled]="currentStep <= 1"
    class="px-4 py-2 text-sm rounded-md transition-colors bg-gray-100 text-gray-700 hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed"
  >
    Previous
  </button>

  <div class="flex-1"></div>

  <!-- Next button -->
  <button
    (click)="next.emit()"
    [disabled]="currentStep >= totalSteps"
    class="px-5 py-2.5 text-sm rounded-md transition-colors bg-primary text-white hover:bg-primary-hover disabled:opacity-50 disabled:cursor-not-allowed"
  >
    Next
  </button>

  <!-- Submit button -->
  <button
    (click)="submit.emit()"
    [disabled]="currentStep !== totalSteps"
    class="px-5 py-2.5 text-sm rounded-md transition-colors bg-green-600 text-white hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed"
  >
    Submit
  </button>
</div>
