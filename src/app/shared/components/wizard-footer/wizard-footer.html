<div class="px-6 py-4 border-t border-black/5 bg-[#fdfcf9] flex justify-between items-center">
  <!-- Back -->
  <button
    (click)="prev.emit()"
    [disabled]="currentStep <= 1"
    class="flex items-center gap-2 px-4 py-2 text-sm rounded-md bg-gray-100 text-gray-700 hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed"
  >
    <lucide-icon [img]="SkipBack" class="w-4 h-4"></lucide-icon>
    Back
  </button>

  <!-- Next / Submit -->
  @if (!isLastStep) {
    <button
      (click)="next.emit()"
      class="flex items-center gap-2 px-5 py-2.5 text-sm rounded-md bg-primary text-white hover:bg-primary-hover"
    >
      {{ nextLabel }}
      <lucide-icon [img]="ChevronRight" class="w-4 h-4"></lucide-icon>
    </button>
  } @else {
    <button
      (click)="submit.emit()"
      class="flex items-center gap-2 px-5 py-2.5 text-sm rounded-md bg-green-600 text-white hover:bg-green-700"
    >
      Create Project
      <lucide-icon [img]="CircleCheck" class="w-4 h-4"></lucide-icon>
    </button>
  }
</div>
