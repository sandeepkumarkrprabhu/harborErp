<div class="px-6 py-4 border-b border-black/5 flex justify-between items-center">
  <h2 class="text-sm font-semibold text-[#1a1a1a]">{{ title }}</h2>

  @if (showClose) {
    <button type="button" [class.hidden]="!showClose" (click)="onClose()">
      <lucide-icon [name]="X" class="w-4 h-4"></lucide-icon>
    </button>
  }
</div>
