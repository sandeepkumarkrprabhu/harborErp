<div class="w-full md:w-56 bg-[#fdfcf9] border-r border-black/5 p-5 flex flex-col gap-6">
  <!-- Header -->
  <div class="flex items-center gap-2 pb-3 border-b border-black/5 mb-2">
    <span class="h-2 w-2 rounded-full bg-[#d08873]"></span>
    <span class="text-xs font-semibold text-[#1a1a1a] uppercase tracking-wider">Wizard Steps</span>
  </div>

  <!-- Steps -->
  <div class="flex flex-col gap-5">
    @for (step of steps; track step.number) {
      <div class="flex items-center gap-3">
        <div
          class="h-6 w-6 rounded-full flex items-center justify-center text-xs font-semibold"
          [class.bg-[#d08873]]="currentStep === step.number"
          [class.text-white]="currentStep === step.number"
          [class.bg-white]="currentStep !== step.number"
          [class.border]="currentStep !== step.number"
          [class.border-black/10]="currentStep !== step.number"
          [class.text-[#8a7f75]]="currentStep !== step.number"
        >
          {{ step.number }}
        </div>
        <div class="flex flex-col">
          <span
            class="text-xs font-semibold"
            [class.text-[#1a1a1a]]="currentStep === step.number"
            [class.text-[#8a7f75]]="currentStep !== step.number"
          >
            {{ step.title }}
          </span>
          <span class="text-[10px] text-[#8a7f75] leading-none mt-0.5">
            {{ step.subtitle }}
          </span>
        </div>
      </div>
    }
  </div>
</div>
